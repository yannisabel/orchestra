name: Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run release'
        required: false
        default: false
        type: boolean

jobs:
  release:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
      - name: Validate npm token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "NPM_TOKEN secret is missing. Add it in repository settings: Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "::add-mask::${NPM_TOKEN}"
          echo "NPM_TOKEN is configured."
      - name: Install dependencies
        run: npm ci
      - name: Build packages
        run: npm run build
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Release (dry-run)
        if: inputs.dry-run == true
        run: |
          npm run release:core:dry
          npm run release:react:dry
          npm run release:angular:dry
          npm run release:vue:dry
          npm run release:design-tokens:dry
          npm run release:icons-library:dry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Release
        if: inputs.dry-run == false
        run: |
          npm run release:core
          npm run release:react
          npm run release:angular
          npm run release:vue
          npm run release:design-tokens
          npm run release:icons-library
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
