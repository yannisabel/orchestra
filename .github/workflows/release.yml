name: Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run release'
        required: false
        default: true
        type: boolean

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
      - name: Preflight permissions
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NPM_TOKEN secret is missing. Add it in repository settings: Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [ -z "${GH_TOKEN}" ]; then
            echo "GITHUB_TOKEN is missing."
            exit 1
          fi

          echo "::add-mask::${NODE_AUTH_TOKEN}"
          npm config delete always-auth --location=user || true
          npm whoami >/dev/null

          npm_scope=$(node -p "require('./packages/core/package.json').name.split('/')[0]")
          if [ -z "${npm_scope}" ] || [ "${npm_scope#@}" = "${npm_scope}" ]; then
            echo "No scoped package name detected in packages/core/package.json."
            exit 1
          fi

          if ! npm access list packages "${npm_scope}" --json >/dev/null; then
            echo "Unable to verify npm scope access for ${npm_scope}."
            echo "Ensure the scope exists and the NPM token has publish access."
            exit 1
          fi

          if ! curl -fsS \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}" >/dev/null; then
            echo "Unable to access repository API with GITHUB_TOKEN."
            echo "Ensure workflow permissions include contents: write and token is available."
            exit 1
          fi

          echo "npm and GitHub permission checks passed."
      - name: Install dependencies (retry)
        uses: ./.github/actions/npm-ci-retry
      - name: Build packages
        id: build_packages
        run: npm run build
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Validate internal version alignment
        run: |
          node .github/scripts/validate-internal-version-alignment.cjs
      - name: Preflight dry-run release (advisory)
        id: preflight_release
        if: inputs.dry-run == false
        continue-on-error: true
        run: |
          node .github/scripts/release-packages.cjs
        env:
          DRY_RUN: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Preflight dry-run workspace diff
        if: inputs.dry-run == false
        run: |
          set -euo pipefail
          echo "Changed files after preflight dry-run:"
          git status --short
          echo
          echo "Changed tracked files:"
          git diff --name-only
      - name: Preflight result
        if: inputs.dry-run == false && steps.preflight_release.outcome == 'failure'
        run: |
          echo "Preflight dry-run failed, continuing to real release."
          echo "Check preflight logs for package-level dry-run issues."
      - name: Preflight working tree cleanliness
        if: steps.build_packages.outcome == 'success'
        run: |
          set -euo pipefail
          git status --short

          if [ -n "$(git status --porcelain)" ]; then
            echo "Working tree must be clean before release."
            echo "A previous step modified files. Inspect logs above."
            exit 1
          fi
      - name: Release packages
        if: steps.build_packages.outcome == 'success'
        run: |
          node .github/scripts/release-packages.cjs
        env:
          DRY_RUN: ${{ inputs.dry-run }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-storybook-main:
    needs: release
    if: github.ref == 'refs/heads/main' && inputs.dry-run == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
      - name: Install dependencies (retry)
        uses: ./.github/actions/npm-ci-retry
      - name: Build packages
        run: npm run build
      - name: Build Storybook
        run: npm run build:storybook
      - name: Deploy Storybook to GitHub Pages (main)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./packages/storybook/storybook-static
          keep_files: true
