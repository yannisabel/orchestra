name: Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run release'
        required: false
        default: true
        type: boolean

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
      - name: Validate npm token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "NPM_TOKEN secret is missing. Add it in repository settings: Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "::add-mask::${NPM_TOKEN}"
          echo "NPM_TOKEN is configured."
      - name: Validate npm scope access
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm config delete always-auth --location=user || true
          npm whoami >/dev/null

          NPM_SCOPE=$(node -p "require('./packages/core/package.json').name.split('/')[0]")
          if [ -z "${NPM_SCOPE}" ] || [ "${NPM_SCOPE#@}" = "${NPM_SCOPE}" ]; then
            echo "No scoped package name detected in packages/core/package.json."
            exit 1
          fi

          set +e
          scope_output=$(npm access list packages "${NPM_SCOPE}" --json 2>&1)
          scope_exit=$?
          set -e

          if [ ${scope_exit} -ne 0 ]; then
            echo "${scope_output}"
            if echo "${scope_output}" | grep -Eqi 'E404|scope not found'; then
              echo "NPM scope ${NPM_SCOPE} was not found or this token has no access to it."
              echo "Create the scope/org on npm and grant this token publish rights, or rename packages to a scope you own."
            else
              echo "Unable to verify npm scope access for ${NPM_SCOPE}."
            fi
            exit 1
          fi

          echo "NPM scope ${NPM_SCOPE} is accessible."
      - name: Validate GitHub release permissions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "GITHUB_TOKEN is missing."
            exit 1
          fi

          response=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}")
          body=$(echo "${response}" | sed '$d')
          status_code=$(echo "${response}" | tail -n 1)

          if [ "${status_code}" != "200" ]; then
            echo "Unable to access repository API with GITHUB_TOKEN (HTTP ${status_code})."
            echo "Ensure workflow permissions include contents: write and token is available."
            exit 1
          fi

          echo "GitHub token is valid and can access repository API."
      - name: Install dependencies
        run: npm ci
      - name: Build packages
        run: npm run build
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Release (dry-run)
        if: inputs.dry-run == true
        run: |
          npm run release:core:dry
          npm run release:react:dry
          npm run release:angular:dry
          npm run release:vue:dry
          npm run release:design-tokens:dry
          npm run release:icons-library:dry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Release
        if: inputs.dry-run == false
        run: |
          npm run release:core:dry
          npm run release:react:dry
          npm run release:angular:dry
          npm run release:vue:dry
          npm run release:design-tokens:dry
          npm run release:icons-library:dry

          npm run release:core -- --no-github
          npm run release:react -- --no-github
          npm run release:angular -- --no-github
          npm run release:vue -- --no-github
          npm run release:design-tokens -- --no-github
          npm run release:icons-library -- --no-github

          for tag in \
            "$(git tag --list '@orchestra-design-system/core@*' --sort=-v:refname | head -n 1)" \
            "$(git tag --list '@orchestra-design-system/react@*' --sort=-v:refname | head -n 1)" \
            "$(git tag --list '@orchestra-design-system/angular@*' --sort=-v:refname | head -n 1)" \
            "$(git tag --list '@orchestra-design-system/vue@*' --sort=-v:refname | head -n 1)" \
            "$(git tag --list '@orchestra-design-system/design-tokens@*' --sort=-v:refname | head -n 1)" \
            "$(git tag --list '@orchestra-design-system/icons-library@*' --sort=-v:refname | head -n 1)"; do
            if [ -z "${tag}" ]; then
              echo "Failed to resolve package tag for GitHub release creation."
              exit 1
            fi
            gh release view "${tag}" >/dev/null 2>&1 || gh release create "${tag}" --generate-notes
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-storybook-main:
    needs: release
    if: github.ref == 'refs/heads/main' && inputs.dry-run == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
      - name: Install dependencies
        run: npm ci
      - name: Build packages
        run: npm run build
      - name: Build Storybook
        run: npm run build:storybook
      - name: Deploy Storybook to GitHub Pages (main)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./packages/storybook/storybook-static
          keep_files: true
