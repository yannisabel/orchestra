name: Lint & Test

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  lint:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
      - name: Install dependencies (retry)
        uses: ./.github/actions/npm-ci-retry
      - name: Run linting
        run: npm run lint

  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-noble
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
      - name: Install dependencies (retry)
        uses: ./.github/actions/npm-ci-retry
      - name: Build packages
        run: npm run build
      - name: Run tests
        run: npm run test
